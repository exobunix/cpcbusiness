kind = "web"
previewPath = "/"
title = "CPCBusiness Platform"
version = "1.0.0"
id = "artifacts/cpcbusiness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21430

[services.development]
run = "pnpm --filter @workspace/cpcbusiness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cpcbusiness", "run", "build" ]
publicDir = "artifacts/cpcbusiness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21430"
BASE_PATH = "/"
